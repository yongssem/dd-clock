<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뚝딱 시계 · 용쌤</title>
  <meta name="description" content="교실 스크린을 위한 부드러운 뉴모피즘 시계. 현재 교시와 진행도를 한눈에." />
  <meta property="og:title" content="뚝딱 시계 · 용쌤" />
  <meta property="og:description" content="교실용 뉴모피즘 시계 · 무궁무진클래스" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== Theme tokens ===== */
    .theme-light {
      --bg: #fbf9f8;
      --panel: #f1efee;
      --text: #1b1c1c;
      --text-muted: #4a504a;
      --primary: #4a654e;
      --primary-soft: #cceace;
      --primary-ink: #07200f;
      --accent: #8e4e14;
      --track: #e4e2e2;
      --shadow-light: rgba(255, 255, 255, 1);
      --shadow-dark: rgba(0, 0, 0, 0.08);
    }
    .theme-dark {
      --bg: #14171f;
      --panel: #1c1f29;
      --text: #f1efee;
      --text-muted: #a8aab1;
      --primary: #b0ceb2;
      --primary-soft: #2a3a2e;
      --primary-ink: #e6f4e8;
      --accent: #ffb780;
      --track: #2a2e3a;
      --shadow-light: rgba(255, 255, 255, 0.04);
      --shadow-dark: rgba(0, 0, 0, 0.55);
    }
    .theme-pastel {
      --bg: #ffe5ec;
      --panel: #fff0f5;
      --text: #5b2a6b;
      --text-muted: #8a5a9a;
      --primary: #c084d6;
      --primary-soft: #f7d8ff;
      --primary-ink: #4a1f5e;
      --accent: #ff6b9d;
      --track: #f7c8d8;
      --shadow-light: rgba(255, 255, 255, 0.9);
      --shadow-dark: rgba(180, 70, 120, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-weight: 500;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ===== Neo shadows ===== */
    .neo {
      box-shadow:
        -8px -8px 16px var(--shadow-light),
        8px 8px 16px var(--shadow-dark);
    }
    .neo-inset {
      box-shadow:
        inset -4px -4px 8px var(--shadow-light),
        inset 4px 4px 8px var(--shadow-dark);
    }
    .neo-btn {
      box-shadow:
        -4px -4px 8px var(--shadow-light),
        4px 4px 8px var(--shadow-dark);
      transition: all 0.2s ease;
    }
    .neo-btn:hover { transform: translateY(-1px); }
    .neo-btn:active {
      box-shadow:
        inset -2px -2px 4px var(--shadow-light),
        inset 2px 2px 4px var(--shadow-dark);
      transform: translateY(0);
    }

    /* ===== Topbar ===== */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      gap: 12px;
    }
    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.01em;
    }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    .theme-group { display: flex; gap: 8px; }

    .icon-btn {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: var(--bg);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .icon-btn.active {
      background: var(--primary-soft);
      color: var(--primary-ink);
    }

    .text-btn {
      border: none;
      background: var(--bg);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      padding: 10px 20px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* ===== Main ===== */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 32px;
    }

    .stage {
      background: var(--panel);
      border-radius: 40px;
      padding: 56px 64px;
      max-width: 1100px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .date {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: -0.01em;
    }
    .date .dow { color: var(--accent); margin-left: 6px; }

    .clock {
      font-size: 13rem;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--primary);
      user-select: none;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .clock .seconds {
      font-size: 4.5rem;
      color: var(--accent);
      opacity: 0.85;
      font-weight: 700;
    }

    .progress-block {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary-soft);
      color: var(--primary-ink);
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .status-chip .emoji { font-size: 1.5rem; }

    .progress-wrap { width: 100%; }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
      padding: 0 6px;
    }
    .progress-track {
      height: 22px;
      width: 100%;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--primary);
      border-radius: 999px;
      position: relative;
      transition: width 0.6s ease;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent);
      border-radius: 999px;
    }

    /* ===== Footer ===== */
    footer {
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    footer a:hover { text-decoration: underline; }

    /* ===== Modal ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--panel);
      border-radius: 32px;
      padding: 36px 40px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 {
      margin: 0 0 24px 0;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.01em;
    }
    .schedule-row {
      display: grid;
      grid-template-columns: 80px 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      font-size: 1rem;
    }
    .schedule-row label { font-weight: 700; color: var(--text-muted); }
    .schedule-row span { color: var(--text-muted); }
    .schedule-row input[type="time"] {
      border: none;
      background: var(--bg);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      width: 100%;
      box-shadow:
        inset -2px -2px 4px var(--shadow-light),
        inset 2px 2px 4px var(--shadow-dark);
    }
    .schedule-row input[type="time"]:focus { outline: 2px solid var(--primary); }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .modal-actions .text-btn.primary {
      background: var(--primary);
      color: #fff;
    }
    .modal-actions .text-btn.primary:active {
      box-shadow:
        inset -2px -2px 4px rgba(255,255,255,0.15),
        inset 2px 2px 4px rgba(0,0,0,0.25);
    }

    /* ===== Responsive ===== */
    @media (max-width: 1024px) {
      .clock { font-size: 9rem; }
      .clock .seconds { font-size: 3rem; }
      .stage { padding: 40px; border-radius: 32px; }
    }
    @media (max-width: 700px) {
      .topbar { padding: 16px 20px; }
      .brand { font-size: 1.2rem; }
      main { padding: 16px; }
      .stage { padding: 28px 20px; gap: 20px; border-radius: 28px; }
      .date { font-size: 1.2rem; }
      .clock { font-size: 5rem; }
      .clock .seconds { font-size: 1.8rem; }
      .status-chip { font-size: 1rem; padding: 10px 18px; }
      .progress-track { height: 16px; }
      .schedule-row { grid-template-columns: 60px 1fr auto 1fr; font-size: 0.9rem; }
      .modal { padding: 24px 20px; border-radius: 24px; }
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body class="theme-light">
  <header class="topbar">
    <div class="brand">뚝딱 시계</div>
    <div class="topbar-actions">
      <div class="theme-group">
        <button class="icon-btn neo-btn" data-theme="light" title="밝은 모드">🌞</button>
        <button class="icon-btn neo-btn" data-theme="dark" title="어두운 모드">🌙</button>
        <button class="icon-btn neo-btn" data-theme="pastel" title="파스텔 모드">🌸</button>
      </div>
      <button class="text-btn neo-btn" id="open-settings">⚙️ 교시설정</button>
    </div>
  </header>

  <main>
    <div class="stage neo">
      <div class="date" id="date">—</div>
      <div class="clock">
        <span id="time-main">00:00</span>
        <span class="seconds" id="time-sec">00</span>
      </div>
      <div class="progress-block">
        <div class="status-chip">
          <span class="emoji" id="status-emoji">📚</span>
          <span id="status-label">—</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-labels">
            <span id="period-start">—</span>
            <span id="period-end">—</span>
          </div>
          <div class="progress-track neo-inset">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>© 2026 무궁무진클래스 · 용쌤</span>
    <a href="https://mumuclass.kr" target="_blank" rel="noopener">mumuclass.kr →</a>
  </footer>

  <div class="overlay" id="overlay">
    <div class="modal neo">
      <h2>⚙️ 교시 시간표</h2>
      <div id="schedule-editor"></div>
      <div class="modal-actions">
        <button class="text-btn neo-btn" id="reset-btn">기본값</button>
        <button class="text-btn neo-btn" id="cancel-btn">취소</button>
        <button class="text-btn neo-btn primary" id="save-btn">저장</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_THEME = 'dd-clock-theme';
    const STORAGE_SCHEDULE = 'dd-clock-schedule';

    const DEFAULT_SCHEDULE = [
      { period: 1, start: '09:00', end: '09:40' },
      { period: 2, start: '09:50', end: '10:30' },
      { period: 3, start: '10:40', end: '11:20' },
      { period: 4, start: '11:30', end: '12:10' },
      { period: 5, start: '13:00', end: '13:40' },
      { period: 6, start: '13:50', end: '14:30' }
    ];

    const DAYS = ['일', '월', '화', '수', '목', '금', '토'];

    let schedule = loadSchedule();

    function loadSchedule() {
      try {
        const raw = localStorage.getItem(STORAGE_SCHEDULE);
        if (!raw) return structuredClone(DEFAULT_SCHEDULE);
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length !== 6) return structuredClone(DEFAULT_SCHEDULE);
        return parsed;
      } catch {
        return structuredClone(DEFAULT_SCHEDULE);
      }
    }

    function applyTheme(name) {
      document.body.className = 'theme-' + name;
      localStorage.setItem(STORAGE_THEME, name);
      document.querySelectorAll('[data-theme]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === name);
      });
    }

    function pad(n) { return String(n).padStart(2, '0'); }
    function toMinutes(hhmm) {
      const [h, m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }

    function currentPeriodInfo(now) {
      const cur = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
      for (let i = 0; i < schedule.length; i++) {
        const s = schedule[i];
        const start = toMinutes(s.start);
        const end = toMinutes(s.end);
        if (cur >= start && cur < end) {
          return {
            emoji: '📚',
            label: `${s.period}교시 (수업 중)`,
            startText: s.start,
            endText: s.end,
            progress: ((cur - start) / (end - start)) * 100
          };
        }
      }
      for (let i = 0; i < schedule.length - 1; i++) {
        const curEnd = toMinutes(schedule[i].end);
        const nextStart = toMinutes(schedule[i + 1].start);
        if (cur >= curEnd && cur < nextStart) {
          return {
            emoji: '☕',
            label: `쉬는 시간`,
            startText: schedule[i].end,
            endText: schedule[i + 1].start,
            progress: ((cur - curEnd) / (nextStart - curEnd)) * 100
          };
        }
      }
      const firstStart = toMinutes(schedule[0].start);
      const lastEnd = toMinutes(schedule[schedule.length - 1].end);
      if (cur < firstStart) {
        return {
          emoji: '🌅',
          label: '등교 시간',
          startText: '—',
          endText: `1교시 ${schedule[0].start}`,
          progress: 0
        };
      }
      if (cur >= lastEnd) {
        return {
          emoji: '🎒',
          label: '방과 후',
          startText: '오늘 수업 끝',
          endText: '—',
          progress: 100
        };
      }
      return { emoji: '⏰', label: '—', startText: '—', endText: '—', progress: 0 };
    }

    function updateClock() {
      const now = new Date();
      const d = `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())}`;
      document.getElementById('date').innerHTML = `${d}<span class="dow">(${DAYS[now.getDay()]})</span>`;
      document.getElementById('time-main').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('time-sec').textContent = pad(now.getSeconds());

      const p = currentPeriodInfo(now);
      document.getElementById('status-emoji').textContent = p.emoji;
      document.getElementById('status-label').textContent = p.label;
      document.getElementById('period-start').textContent = p.startText;
      document.getElementById('period-end').textContent = p.endText;
      document.getElementById('progress-fill').style.width = Math.max(0, Math.min(100, p.progress)) + '%';
    }

    function renderEditor(data) {
      const editor = document.getElementById('schedule-editor');
      editor.innerHTML = '';
      data.forEach((s, idx) => {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `
          <label>${s.period}교시</label>
          <input type="time" data-idx="${idx}" data-field="start" value="${s.start}" />
          <span>~</span>
          <input type="time" data-idx="${idx}" data-field="end" value="${s.end}" />
        `;
        editor.appendChild(row);
      });
    }

    function openSettings() {
      renderEditor(schedule);
      document.getElementById('overlay').classList.add('open');
    }
    function closeSettings() {
      document.getElementById('overlay').classList.remove('open');
    }

    function collectEditor() {
      const rows = document.querySelectorAll('#schedule-editor .schedule-row');
      const next = structuredClone(DEFAULT_SCHEDULE);
      rows.forEach((row, idx) => {
        const startIn = row.querySelector('[data-field="start"]').value;
        const endIn = row.querySelector('[data-field="end"]').value;
        if (startIn) next[idx].start = startIn;
        if (endIn) next[idx].end = endIn;
      });
      return next;
    }

    document.querySelectorAll('[data-theme]').forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
    });
    document.getElementById('open-settings').addEventListener('click', openSettings);
    document.getElementById('cancel-btn').addEventListener('click', closeSettings);
    document.getElementById('overlay').addEventListener('click', (e) => {
      if (e.target.id === 'overlay') closeSettings();
    });
    document.getElementById('reset-btn').addEventListener('click', () => {
      renderEditor(DEFAULT_SCHEDULE);
    });
    document.getElementById('save-btn').addEventListener('click', () => {
      schedule = collectEditor();
      localStorage.setItem(STORAGE_SCHEDULE, JSON.stringify(schedule));
      closeSettings();
      updateClock();
    });

    applyTheme(localStorage.getItem(STORAGE_THEME) || 'light');
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
